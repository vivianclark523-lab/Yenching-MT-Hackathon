# Pre-commit hooks — 本地 commit 前自动跑的检查。
# 配套文档：docs/team-workflow.md
#
# 安装（每位队员 clone 后必做一次）：
#   pre-commit install
#
# 手动跑全部钩子：
#   pre-commit run --all-files

# 全局排除：openclaw/ 是 vendored 上游代码，我们不动也不检查；
# _history/ 里是大 jsonl 文件，无意义检查。
exclude: |
  (?x)^(
    openclaw/.*|
    _history/.*
  )$

repos:
  # ----- 通用基础检查 -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: "Check YAML 合法性"
      - id: check-added-large-files
        name: "拦截大文件（> 5 MB）"
        args: ['--maxkb=5120']
      - id: check-merge-conflict
        name: "拦截未解决的 merge 冲突标记"
      - id: detect-private-key
        name: "拦截 SSH/SSL 私钥"
      - id: check-case-conflict
        name: "拦截跨平台大小写冲突的文件名"
      - id: check-symlinks
        name: "拦截损坏的符号链接"
      - id: end-of-file-fixer
        name: "文件末尾自动加换行"
      - id: trailing-whitespace
        name: "去除行尾空格"
        args: ['--markdown-linebreak-ext=md']

  # ----- 凭证/密钥泄露扫描（专业级）-----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "Gitleaks 扫描（密钥/凭证/token）"

  # ----- SKILL.md frontmatter 校验（自定义本地钩子）-----
  - repo: local
    hooks:
      - id: validate-skill-md
        name: "校验我们写的 Skill 是否符合 SKILL.md 规范"
        entry: scripts/validate-skill-md.sh
        language: script
        files: ^skills/.+/SKILL\.md$
        pass_filenames: true
