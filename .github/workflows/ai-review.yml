name: AI Review (DeepSeek)

# 用 DeepSeek V4 Pro 对 PR 做 AI code review。
# 实现脚本：.github/scripts/ai-review.py
#
# 触发条件：
#   1. PR opened / synchronize / reopened → 自动跑
#   2. PR 评论里包含 @deepseek → 手动重审
#
# 依赖：仓库 secret `DEEPSEEK_API_KEY` 已配置。
# 文档：https://api-docs.deepseek.com/zh-cn/
# 想换模型 / base URL：改下面 env 段即可。

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  DEEPSEEK_MODEL: deepseek-v4-pro
  DEEPSEEK_BASE_URL: https://api.deepseek.com

jobs:
  review:
    name: DeepSeek review
    # 自动跑：所有 PR 事件
    # 手动跑：评论 + @deepseek + 该评论在 PR 上（非 issue）
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@deepseek'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install --quiet requests

      - name: Resolve PR base/head SHAs and PR number
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            pr=$(gh api "/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")
            echo "base_sha=$(echo "$pr" | jq -r .base.sha)" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(echo "$pr" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run DeepSeek review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BASE_SHA: ${{ steps.shas.outputs.base_sha }}
          HEAD_SHA: ${{ steps.shas.outputs.head_sha }}
        run: python .github/scripts/ai-review.py

      - name: Post review as sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-review-deepseek
          number: ${{ steps.shas.outputs.pr_number }}
          path: /tmp/ai-review.md
