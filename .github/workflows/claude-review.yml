name: Claude Review

# 触发时机：每次 PR 打开 / 更新 / 重开时跑一遍 AI 复审。
# 也允许在 PR 评论里 @claude 触发再跑（适合改完想让 AI 再看一遍）。
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    # 自动跑：PR 事件
    # 手动跑：评论里包含 "@claude" 且是 PR 上的评论
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Anthropic 官方 Claude Code Action
      # 文档：https://docs.claude.com/en/docs/claude-code/github-actions
      # 如果 action 接口有变，按官方最新文档调整 with 字段。
      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            你正在 review 美团 AI Hackathon 项目的一个 Pull Request。
            项目背景：基于 OpenClaw 的本地生活全天候私人管家。团队是 3 个 PM，
            大部分代码由 Claude Code 生成。详见仓库根目录 CLAUDE.md。

            重点关注（按优先级）：
            1. **密钥泄露**：检查是否有 API key、token、个人凭证。
            2. **vendored 代码污染**：`openclaw/` 是上游 v2026.5.12 锁定版，
               原则上不应该被修改。如果 PR 改了，flag 出来并问改的理由。
            3. **SKILL.md 质量**：如果新增/修改了 `skills/*/SKILL.md`，
               check 是否符合 OpenClaw Skill 规范（参考 docs/openclaw-architecture.md 第 3 节）：
               - frontmatter 只用 name + description（OpenClaw 扩展字段可有）
               - description 包含触发条件（"When to use"）
               - body < 500 行
               - 不应该有 README / INSTALLATION 等 auxiliary 文档
            4. **Mock 一致性**：如果改了 `mocks/`，确认时钟和状态机抽象保持一致
               （核心命题：同接口不同时间不同结果，详见 CLAUDE.md 第五节）。
            5. **明显的逻辑 bug 或安全问题**。

            **风格**：精炼直接。如果 PR 没问题，简短说 "LGTM"。
            如果有问题，每条留一个具体可操作的 comment，包含文件 + 行号 + 修复建议。
            不要做表面赞美。不要逐字罗列变更内容。
